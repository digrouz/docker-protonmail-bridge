## @section Kubernetes settings
##
image:
  ## @param image.registry protonmail-bridge image registry
  ##
  registry: docker.io
  ## @param image.repository protonmail-bridge image repository
  ##
  repository: digrouz/protonmail-bridge
  ## @param image.tag protonmail-bridge image tag
  ## Ref: https://hub.docker.com/r/digrouz/protonmail-bridge/tags
  ##
  tag: "latest"
  ## @param image.pullPolicy protonmail-bridge image pull policy
  ## ref: https://kubernetes.io/docs/user-guide/images/#pre-pulling-images
  ##
  pullPolicy: Always
## @param nameOverride String to override the release name.
##
nameOverride: ""
## @param fullnameOverride String to override the application name.
##
fullnameOverride: ""
## @section Service Configuration
##
service:
  ## @param service.uid user id running protonmail-bridge
  ##
  uid: 12345
  ## @param service.gid group id running protonmail-bridge
  ##
  gid: 12345
  ## @param service.autoupgrade apply OS updates inside container at startup
  ##
  autoupgrade: 0
  ## @param service.tz Time Zone
  ##
  tz: Europe/Brussels
  ## @param service.type Kubernetes service type
  ##
  type: ClusterIP
  ports:
    ## @param service.ports.imap IMAP port
    ##
    imap: 143
    ## @param service.ports.smtp SMTP port
    ##
    smtp: 25
## @section Storage persistence Configuration
##
persistence:
  config:
    ## @param persistence.config.enabled Enable persistence for protonmail-bridge config
    ## If enabled, the config will be stored in a persistent volume
    ## If disabled, the config will be stored in a temporary volume
    enabled: true
    ## @param persistence.config.storageClass Storage class for protonmail-bridge config
    ## If not set, the default storage class will be used
    storageClass: default
    ## @param persistence.config.existingClaim Existing persistent volume claim for protonmail-bridge config
    ## If set, the config will be stored in the existing persistent volume claim
    existingClaim: ""
    ## @param persistence.config.accessMode Access mode for protonmail-bridge config
    ## If not set, the default access mode will be used
    accessMode: ReadWriteOnce
    ## @param persistence.config.size Size of the persistent volume for protonmail-bridge config
    ## If not set, the default size will be used
    size: 1024Mi
    ## @param persistence.config.mountPath Mount path for protonmail-bridge config
    ##
    mountPath: /home/appuser/.config/protonmail-bridge
## @section Gateway API Configuration
##
gatewayApi:
  ## @param gatewayApi.enabled Enable Gateway API TCPRoute resources
  ##
  enabled: false
  ## @param gatewayApi.tcpRoutes List of TCPRoutes to create
  ##
  tcpRoutes:
    - name: imap
      port: 143
      parentRefs:
        - name: my-gateway
          namespace: default
    - name: smtp
      port: 25
      parentRefs:
        - name: my-gateway
          namespace: default
