---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "protonmail-bridge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: protonmail-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: protonmail-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/component: protonmail-bridge
    spec:
      containers:
        - name: protonmail-bridge
          image: {{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.ports.imap }}
              name: imap
              protocol: TCP
            - containerPort: {{ .Values.service.ports.smtp }}
              name: smtp
              protocol: TCP
          volumeMounts:
            - mountPath: {{ .Values.persistence.config.mountPath }}
              name: protonmail-bridge-config
          env:
            - name: GID
              value: "{{ .Values.service.gid }}"
            - name: UID
              value: "{{ .Values.service.uid }}"
            - name: TZ
              value: "{{ .Values.service.tz }}"
            - name: AUTOUPGRADE
              value: "{{ .Values.service.autoupgrade }}"
      volumes:
        - name: protonmail-bridge-config
          {{- if .Values.persistence.config.enabled }}
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.config.existingClaim }}{{ .Values.persistence.config.existingClaim }}{{- else }}{{ include "protonmail-bridge.fullname" . }}-config-pvc{{- end }}
          {{- else }}
          emptyDir: { }
          {{- end }}
